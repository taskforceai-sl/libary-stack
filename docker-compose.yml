version: '3.9'

services:
  # PostgreSQL database for local development
  postgres:
    image: postgres:16-alpine
    container_name: jingles-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: jingles_inventory
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  # Backend API server
  backend:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile.dev
    container_name: jingles-backend
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/jingles_inventory
      JWT_SECRET: dev-jwt-secret-change-in-production
      JWT_EXPIRES_IN: 7d
      PORT: 3001
      NODE_ENV: development
      CORS_ORIGIN: http://localhost:5173
    ports:
      - '3001:3001'
    volumes:
      - ./packages/backend:/app/packages/backend
      - ./packages/shared:/app/packages/shared
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
